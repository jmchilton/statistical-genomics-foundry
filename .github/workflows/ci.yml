name: CI
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Standalone frontmatter validator: negative fixtures + corpus conformance, sharing
      # one schema with the build (issue #89 rung 3). Fails fast, before the fuller build.
      - run: npm test
      # `build` is what deploy.yml runs on main; running it here fails the PR, not deploy.
      - run: npm run build
