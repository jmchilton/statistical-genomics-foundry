# Tag registry for Mold/Pattern frontmatter `tags:`.
#
# Adapted from the parent Foundry's meta_tags.yml (a flat registry), but our
# tags are NAMESPACED (`family/*`, `role/*`, `domain/*`, `topic/*`) — the
# MOLD_SPEC adaptation that replaces the parent's `axis` grouping. Seeded
# corpus-first from the tags the authored Molds + Patterns actually use; a tag
# outside this registry is drift (a build error once enforced).
#
# Every namespace is a CLOSED enum: the full `prefix/value` must be listed here
# with a one-line gloss, so every tag the corpus can carry is documented. Adding a
# new domain/topic is a deliberate registry edit, not a free-form slug. (The loader
# still supports `open: true` namespaces — `prefix/<any-kebab-slug>` — but this
# registry uses none: closed keeps the browse axis curated and self-documenting.)

version: 1

namespaces:
  family:
    label: Family
    description: Which side of the analyze/referee split a Mold sits on (glossary Family A / Family B).
    values:
      family/a: Do the analysis (construct).
      family/b: Referee the analysis (critique + calibrate).

  role:
    label: Role
    description: The Family-A or Family-B role a Mold plays (glossary construct/critique/calibrate).
    values:
      role/construct: Family-A — frame, design-review, select, run.
      role/critique: Family-B — reason about validity against known invalidity patterns.
      role/calibrate: Family-B — construct and run the empirical check (null/simulation/controls/power).

  domain:
    label: Domain
    description: Subject-matter area a Mold/note applies to. Closed enum — add a documented row per domain.
    values:
      domain/ancestral-reconstruction: Inferring ancestral sequence/character states across a phylogeny.
      domain/batch-effects: Technical, non-biological variation that confounds measured signal.
      domain/experimental-design: Sample allocation, blocking, and randomization decided before data collection.
      domain/gene-family-evolution: Gene gain/loss/duplication dynamics across lineages.
      domain/molecular-evolution: Sequence change over evolutionary time (substitution, selection).
      domain/pangenomics: Analysis across a species' full core/accessory gene complement.
      domain/phylogenetics: Inferring evolutionary trees from molecular data.

  topic:
    label: Topic
    description: Finer-grained subject beneath a domain. Closed enum — add a documented row per topic.
    values:
      topic/dnds: Nonsynonymous/synonymous substitution-rate ratio; a test for selection (under molecular-evolution).
